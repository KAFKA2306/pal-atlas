name: Deploy Pal Atlas to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - index.html
      - src/**
      - data/**
      - scripts/**
      - package.json
      - package-lock.json
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run data
      - run: npm run verify:data
      - run: npm run build
      - name: Verify pastel production artifact
        run: |
          set -euo pipefail
          test -s dist/index.html
          grep -F '2026-07-23-pastel-watercolor-1' dist/index.html
          grep -R -F -- '--lavender:' dist/assets
          grep -R -F -- '--rose:' dist/assets
          grep -R -F -- '--mint:' dist/assets
      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
