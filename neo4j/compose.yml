services:
  pal-atlas-neo4j:
    image: neo4j:5.26-community
    container_name: pal-atlas-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-pal-atlas-dev}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - pal_atlas_neo4j_data:/data
      - pal_atlas_neo4j_logs:/logs
      - ./:/var/lib/neo4j/import

volumes:
  pal_atlas_neo4j_data:
  pal_atlas_neo4j_logs:
